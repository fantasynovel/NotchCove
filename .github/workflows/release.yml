name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download DMG from release
        run: |
          curl -L \
            "https://github.com/fantasynovel/NotchCove/releases/download/v${VERSION}/NotchCove.dmg" \
            -o NotchCove.dmg

      - name: Compute SHA256
        run: echo "SHA256=$(sha256sum NotchCove.dmg | awk '{print $1}')" >> $GITHUB_ENV

      - name: Clone homebrew-tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/fantasynovel/homebrew-tap.git" homebrew-tap

      - name: Update Cask formula
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/notchcove.rb <<'CASK_EOF'
          cask "notchcove" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/fantasynovel/NotchCove/releases/download/v#{version}/NotchCove.dmg"
            name "NotchCove"
            desc "Menu bar companion for Claude Code, Codex, Gemini CLI and more"
            homepage "https://github.com/fantasynovel/NotchCove"

            app "Notch Cove.app"

            zap trash: [
              "~/.notchcove",
            ]
          end
          CASK_EOF
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" homebrew-tap/Casks/notchcove.rb
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/" homebrew-tap/Casks/notchcove.rb
          sed -i 's/^          //' homebrew-tap/Casks/notchcove.rb

      - name: Commit and push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/notchcove.rb
          git commit -m "Update notchcove to ${VERSION}"
          git push
